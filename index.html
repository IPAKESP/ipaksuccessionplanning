<script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMzUbqogregSYqVmsiXYS-5BMroUTogKNoDDJIoeyZWAedwFbbwPNmfeNMX6O766_2NeuM3gFhqhED/pub?output=csv";
        
        // YAHAN APNA GITHUB FOLDER LINK DAALEIN
        const githubImageBaseUrl = "https://raw.githubusercontent.com/IPAKESP/ipaksuccessionplanning/refs/heads/main/"; 
        
        let globalData = [];
        let headerOccurrences = {};

        // Automatic Live Update (Cache-Busting) link
        const noCacheUrl = sheetCsvUrl + "&t=" + new Date().getTime();

        Papa.parse(noCacheUrl, {
            download: true, header: true, skipEmptyLines: true,
            transformHeader: function(header) {
                let h = header.trim().replace(/[\r\n]+/g, ' '); 
                if (headerOccurrences[h]) {
                    headerOccurrences[h]++;
                    return h + "_" + headerOccurrences[h]; 
                }
                headerOccurrences[h] = 1;
                return h;
            },
            complete: function(results) {
                document.getElementById('loader').style.display = 'none';
                globalData = results.data;
                renderTabs();
                renderGrid(globalData);
            }
        });

        function getVal(item, possibleKeys) {
            for (let pk of possibleKeys) {
                let target = pk.toLowerCase().replace(/[^a-z0-9_]/g, '');
                for (let key in item) {
                    let source = key.toLowerCase().replace(/[^a-z0-9_]/g, '');
                    if (source === target) {
                        let value = item[key];
                        if (value !== undefined && value !== null && String(value).trim() !== '') {
                            return String(value).trim();
                        }
                    }
                }
            }
            return 'N/A';
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.style.display = 'flex';
            container.innerHTML = ''; // Naye data par tabs duplicate na hon
            
            const depts = ["All", ...new Set(globalData.map(d => getVal(d, ['Department'])).filter(d => d !== 'N/A'))];
            if(depts.length <= 1) return;

            depts.forEach((d, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = d;
                btn.onclick = (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const filtered = d === "All" ? globalData : globalData.filter(item => getVal(item, ['Department']) === d);
                    renderGrid(filtered);
                };
                container.appendChild(btn);
            });
        }

        function getInitials(name) {
            if (!name || name === 'N/A' || name === 'Vacant') return "NA";
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        }

        function generatePhotoUrl(name) {
            if (!name || name === 'N/A' || name === 'Vacant') return "";
            const formattedName = name.trim().toLowerCase().replace(/\s+/g, '_');
            return `${githubImageBaseUrl}${formattedName}.jpg`;
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = data.map((item, index) => {
                const posTitle = getVal(item, ['Position Title', 'Position']);
                const incumbentName = getVal(item, ['Incumbent Name', 'Incumbent']);
                const initials = getInitials(incumbentName);
                const photoUrl = generatePhotoUrl(incumbentName);
                
                return `
                    <div class="card-wrapper" onclick="openModal(${globalData.indexOf(item)})">
                        <div class="card-avatar-container">
                            <img src="${photoUrl}" class="profile-img" alt="${incumbentName}" onerror="this.onerror=null; this.outerHTML='<span class=\\'fallback-initials\\'>${initials}</span>'">
                        </div>
                        <h3 class="role-title">${posTitle}</h3>
                        <p class="incumbent-name">${incumbentName}</p>
                    </div>
                `;
            }).join('');
        }

        function openModal(index) {
            const item = globalData[index];
            
            const posTitle = getVal(item, ['Position Title', 'Position']);
            const incumbentName = getVal(item, ['Incumbent Name', 'Incumbent']);
            const initials = getInitials(incumbentName);
            const photoUrl = generatePhotoUrl(incumbentName);
            
            let html = `
                <div class="modal-top-section">
                    <div>
                        <h2 class="modal-header-title">${posTitle}</h2>
                        <div class="modal-badge">Incumbent: ${incumbentName}</div>
                    </div>
                    <div class="modal-profile-container">
                        <img src="${photoUrl}" class="profile-img" alt="${incumbentName}" onerror="this.onerror=null; this.outerHTML='<span class=\\'fallback-initials\\'>${initials}</span>'">
                    </div>
                </div>

                <div class="section-title"><span></span> Position & Incumbent Details</div>
                <div class="info-grid">
                    <div class="info-card"><div class="info-label">Employee ID</div><div class="info-value">${getVal(item, ['Employee ID'])}</div></div>
                    <div class="info-card"><div class="info-label">Current Position</div><div class="info-value">${getVal(item, ['Current Position'])}</div></div>
                    <div class="info-card"><div class="info-label">Position Rating</div><div class="info-value">${getVal(item, ['Position Rating'])}</div></div>
                    <div class="info-card"><div class="info-label">Position Rating Score</div><div class="info-value">${getVal(item, ['Position Rating Score'])}</div></div>
                    <div class="info-card"><div class="info-label">Risk of Loss</div><div class="info-value">${getVal(item, ['Risk of Loss'])}</div></div>
                    <div class="info-card"><div class="info-label">Date of Joining</div><div class="info-value">${getVal(item, ['Date of Joining'])}</div></div>
                    <div class="info-card"><div class="info-label">IPAK Experience</div><div class="info-value">${getVal(item, ['IPAK Experience'])}</div></div>
                    <div class="info-card"><div class="info-label">Other Experience</div><div class="info-value">${getVal(item, ['Other Experience'])}</div></div>
                    <div class="info-card"><div class="info-label">Total Experience</div><div class="info-value">${getVal(item, ['Total Experience'])}</div></div>
                    <div class="info-card"><div class="info-label">Date of Birth</div><div class="info-value">${getVal(item, ['Date of Birth'])}</div></div>
                    <div class="info-card"><div class="info-label">Age</div><div class="info-value">${getVal(item, ['Age'])}</div></div>
                    <div class="info-card"><div class="info-label">Education</div><div class="info-value">${getVal(item, ['Education'])}</div></div>
                    <div class="info-card"><div class="info-label">Successor Availability</div><div class="info-value">${getVal(item, ['Successor Availability'])}</div></div>
                    <div class="info-card"><div class="info-label">No. of Successors</div><div class="info-value">${getVal(item, ['Number of Successors', 'No of Successors', 'No. of Successors'])}</div></div>
                </div>
            `;

            // Flexible Header Names for Successors (Yahan zyada options daal diye hain taake N/A na aaye)
            const successorName1 = getVal(item, ['Successor Name', 'Successor 1', 'Successor Name 1', 'Successor 1 Name', 'Successor']);
            const successorName2 = getVal(item, ['Successor Name 2', 'Successor 2', 'Successor 2 Name']);
            
            let hasSuccessor = false;

            if(successorName1 !== 'N/A') {
                hasSuccessor = true;
                html += `
                <div class="successor-section">
                    <div class="section-title"><span></span> Successor 1 Details</div>
                    <div class="info-grid">
                        <div class="info-card"><div class="info-label">Successor Name</div><div class="info-value">${successorName1}</div></div>
                        <div class="info-card"><div class="info-label">Successor Employee ID</div><div class="info-value">${getVal(item, ['Successor Employee ID', 'Successor Employee ID 1', 'Successor 1 Employee ID', 'Successor ID', 'Employee ID_2', 'Successor ID_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Current Position</div><div class="info-value">${getVal(item, ['Successor Current Position', 'Successor Current Position 1', 'Successor 1 Current Position', 'Current Position_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Readiness Level</div><div class="info-value">${getVal(item, ['Readiness Level', 'Successor Readiness Level', 'Successor 1 Readiness Level', 'Readiness Level 1', 'Readiness Level_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Date of Joining</div><div class="info-value">${getVal(item, ['Successor Date of Joining', 'Successor Date of Joining 1', 'Successor 1 Date of Joining', 'Date of Joining_2'])}</div></div>
                        <div class="info-card"><div class="info-label">IPAK Experience</div><div class="info-value">${getVal(item, ['Successor IPAK Experience', 'Successor IPAK Experience 1', 'Successor 1 IPAK Experience', 'IPAK Experience_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Other Experience</div><div class="info-value">${getVal(item, ['Successor Other Experience', 'Successor Other Experience 1', 'Successor 1 Other Experience', 'Other Experience_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Total Experience</div><div class="info-value">${getVal(item, ['Successor Total Experience', 'Successor Total Experience 1', 'Successor 1 Total Experience', 'Total Experience_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Date of Birth</div><div class="info-value">${getVal(item, ['Successor Date of Birth', 'Successor Date of Birth 1', 'Successor 1 Date of Birth', 'Date of Birth_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Age</div><div class="info-value">${getVal(item, ['Successor Age', 'Successor Age 1', 'Successor 1 Age', 'Age_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Education</div><div class="info-value">${getVal(item, ['Successor Education', 'Successor Education 1', 'Successor 1 Education', 'Education_2'])}</div></div>
                    </div>
                </div>
                `;
            }

            if(successorName2 !== 'N/A') {
                hasSuccessor = true;
                html += `
                <div class="successor-section" style="background: #eff6ff; border-color: #bfdbfe; margin-top: 20px;">
                    <div class="section-title" style="border-bottom-color: #bfdbfe; margin-top: 0;"><span style="background: #3b82f6;"></span> Successor 2 Details</div>
                    <div class="info-grid">
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Successor Name</div><div class="info-value">${successorName2}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Successor Employee ID</div><div class="info-value">${getVal(item, ['Successor Employee ID 2', 'Successor 2 Employee ID', 'Successor ID 2', 'Employee ID_3', 'Successor ID_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Current Position</div><div class="info-value">${getVal(item, ['Successor Current Position 2', 'Successor 2 Current Position', 'Current Position_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Readiness Level</div><div class="info-value">${getVal(item, ['Readiness Level 2', 'Successor Readiness Level 2', 'Successor 2 Readiness Level', 'Readiness Level_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Date of Joining</div><div class="info-value">${getVal(item, ['Successor Date of Joining 2', 'Successor 2 Date of Joining', 'Date of Joining_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">IPAK Experience</div><div class="info-value">${getVal(item, ['Successor IPAK Experience 2', 'Successor 2 IPAK Experience', 'IPAK Experience_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Other Experience</div><div class="info-value">${getVal(item, ['Successor Other Experience 2', 'Successor 2 Other Experience', 'Other Experience_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Total Experience</div><div class="info-value">${getVal(item, ['Successor Total Experience 2', 'Successor 2 Total Experience', 'Total Experience_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Date of Birth</div><div class="info-value">${getVal(item, ['Successor Date of Birth 2', 'Successor 2 Date of Birth', 'Date of Birth_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Age</div><div class="info-value">${getVal(item, ['Successor Age 2', 'Successor 2 Age', 'Age_3'])}</div></div>
                        <div class="info-card" style="border-color: #dbeafe;"><div class="info-label">Education</div><div class="info-value">${getVal(item, ['Successor Education 2', 'Successor 2 Education', 'Education_3'])}</div></div>
                    </div>
                </div>
                `;
            }

            if(!hasSuccessor) {
                html += `
                <div class="successor-section" style="background: #fef2f2; border-color: #fecaca; margin-top: 30px;">
                    <div class="section-title" style="border-bottom-color: #fecaca; margin-top: 0;"><span style="background: #ef4444;"></span> Successor Details</div>
                    <p style="color: #991b1b; padding: 10px 0;">No successor currently mapped for this position.</p>
                </div>
                `;
            }

            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() { 
            document.getElementById('detailModal').classList.remove('active'); 
            document.body.style.overflow = 'auto';
        }

        function closeOnOverlay(event) {
            if (event.target.id === 'detailModal') {
                closeModal();
            }
        }
    </script>
