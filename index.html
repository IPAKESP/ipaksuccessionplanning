<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Succession Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            /* Light Mode Corporate Palette */
            --bg-main: #f8f9fa; 
            --bg-card: #ffffff; 
            --bg-surface: #f0f4f9;
            --text-main: #1f1f1f;
            --text-dim: #444746; 
            --border-color: #e3e3e3;
            --primary: #0b57d0;
            --primary-hover: #0842a0;
            --gradient-border: linear-gradient(135deg, #4285f4, #9b72cb, #ea4335, #fbbc04);
            
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding-bottom: 60px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* -------------------------
           Premium Login / PIN View 
        -------------------------- */
        #login-view {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            background: #fdfdfd;
        }

        /* Subtle Animated Ambient Background for Login */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: floatBlob 12s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blob-1 { background: #4285f4; width: 400px; height: 400px; top: -100px; left: -100px; animation-delay: 0s; }
        .blob-2 { background: #9b72cb; width: 350px; height: 350px; bottom: -50px; right: -50px; animation-delay: -4s; }
        .blob-3 { background: #fbbc04; width: 250px; height: 250px; top: 40%; left: 60%; animation-delay: -8s; opacity: 0.3; }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 50px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 1);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logos */
        .login-logo { height: 75px; margin-bottom: 20px; object-fit: contain; }

        .pin-title { font-size: 28px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; letter-spacing: -0.5px; }
        .pin-subtitle { font-size: 15px; color: var(--text-dim); text-align: center; line-height: 1.5; margin-bottom: 35px; }

        /* 4-Digit OTP Input Grid */
        .otp-container {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
        }

        .otp-input {
            width: 65px;
            height: 75px;
            font-size: 32px;
            text-align: center;
            border-radius: 16px;
            border: 2px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-main);
            font-family: 'Outfit', monospace;
            font-weight: 600;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .otp-input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(11, 87, 208, 0.15), inset 0 2px 4px rgba(0,0,0,0.01);
            transform: translateY(-2px);
        }

        #pin-error { color: #ef4444; font-size: 14px; font-weight: 500; min-height: 20px; text-align: center; margin-bottom: 10px; }

        .pin-btn {
            width: 100%;
            background: var(--text-main); 
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
        }
        .pin-btn:hover { background: #000; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15); transform: translateY(-2px); }

        /* Shake animation for incorrect PIN */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }


        /* -------------------------
           Dashboard Styles (Hidden until unlocked)
        -------------------------- */
        #dashboard-view { display: none; animation: fadeInDashboard 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes fadeInDashboard { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; padding: 60px 20px 40px; }
        .header h1 { font-size: 40px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; }
        .header p { color: var(--text-dim); margin-top: 8px; font-size: 18px; font-weight: 400; }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        #loader { text-align: center; color: var(--primary); padding: 50px; font-weight: 500; font-size: 18px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        #loader::after { content: ""; width: 20px; height: 20px; border: 3px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tabs-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin-bottom: 50px; }
        .tab-btn { background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border-color); padding: 12px 24px; border-radius: 40px; cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--shadow-sm); }
        .tab-btn:hover { background: var(--bg-surface); color: var(--text-main); transform: translateY(-2px); }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(11, 87, 208, 0.2); }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 28px; }
        
        .card-wrapper { 
            position: relative; border-radius: 24px; padding: 2px; 
            background: var(--bg-card); cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease; 
            box-shadow: var(--shadow-sm); z-index: 1;
        }
        
        .card-wrapper::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 24px;
            background: var(--gradient-border); background-size: 300% 300%; z-index: -1; opacity: 0;
            transition: opacity 0.4s ease; animation: gradient-shift 4s ease infinite;
        }
        .card-wrapper:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
        .card-wrapper:hover::before { opacity: 1; }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-content { background: var(--bg-card); border-radius: 22px; padding: 30px 25px; height: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card-avatar-container { width: 88px; height: 88px; margin-bottom: 20px; border-radius: 50%; overflow: hidden; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); border: 3px solid #fff; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; }
        .fallback-initials { color: var(--primary); font-size: 26px; font-weight: 700; letter-spacing: 1px; }
        .role-title { font-size: 19px; font-weight: 600; color: var(--text-main); margin-bottom: 10px; line-height: 1.3; }
        .incumbent-name { font-size: 15px; font-weight: 500; color: var(--text-dim); background: var(--bg-surface); padding: 6px 16px; border-radius: 20px; }
        
        /* Modal Overlay */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(31, 31, 31, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity:0; visibility:hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; }
        .modal-overlay.active { opacity:1; visibility:visible; }
        .modal-container { background: var(--bg-card); border-radius: 28px; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; padding: 45px; box-shadow: var(--shadow-lg); position: relative; transform: scale(0.95); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid var(--border-color); }
        .modal-overlay.active .modal-container { transform: scale(1); }
        .close-btn { position: absolute; top: 25px; right: 25px; background: var(--bg-surface); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: var(--text-dim); font-size: 18px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .close-btn:hover { background: #e3e3e3; color: var(--text-main); transform: rotate(90deg); }

        .modal-top-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-right: 50px; border-bottom: 1px solid var(--border-color); padding-bottom: 30px; }
        .modal-header-text { display: flex; flex-direction: column; gap: 8px; }
        .modal-header-title { font-size: 32px; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        .modal-badge { display: inline-flex; align-items: center; background: var(--bg-surface); color: var(--primary); padding: 6px 16px; border-radius: 12px; font-size: 15px; font-weight: 600; width: fit-content; }
        .modal-profile-container { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md); border: 4px solid #fff; flex-shrink: 0; }
        
        .section-title { font-size: 20px; font-weight: 600; margin: 30px 0 20px; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .section-title span { background: var(--gradient-border); width: 12px; height: 24px; border-radius: 6px; display: inline-block; background-size: 200% 200%; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
        .info-card { background: var(--bg-main); border: 1px solid transparent; padding: 20px; border-radius: 16px; transition: border 0.3s; }
        .info-card:hover { border-color: #d2e3fc; background: #fff; box-shadow: var(--shadow-sm); }
        .info-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 500; }
        .info-value { font-size: 16px; font-weight: 600; color: var(--text-main); word-break: break-word; line-height: 1.4; }
        
        .successor-section { border-radius: 20px; padding: 30px; margin-top: 35px; border: 1px solid; }
        
        /* Successor Photo Header Layout */
        .successor-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .successor-profile-container { width: 75px; height: 75px; border-radius: 50%; overflow: hidden; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); border: 3px solid #fff; flex-shrink: 0; }

        .succ-1 { background: #f0fdf4; border-color: #bbf7d0; }
        .succ-1 .section-title span { background: #16a34a; }
        .succ-1 .info-card { background: #ffffff; border-color: #dcfce3; }
        .succ-1 .info-card:hover { border-color: #86efac; box-shadow: 0 2px 8px rgba(22, 163, 74, 0.05); }

        .succ-2 { background: #eff6ff; border-color: #bfdbfe; }
        .succ-2 .section-title span { background: #3b82f6; }
        .succ-2 .info-card { background: #ffffff; border-color: #dbeafe; }
        .succ-2 .info-card:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(59, 130, 246, 0.05); }

        .succ-none { background: #fef2f2; border-color: #fecaca; }
        .succ-none .section-title span { background: #ef4444; }
        .succ-none p { color: #991b1b; font-size: 16px; font-weight: 500; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="ambient-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>
        
        <div class="login-card" id="pin-card">
            <img src="logo.png" alt="IPAK Logo" class="login-logo">
            <h2 class="pin-title">Secure Access</h2>
            <p class="pin-subtitle">Enter your authorization code to access the succession dashboard.</p>
            
            <div class="otp-container">
                <input type="password" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                <input type="password" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                <input type="password" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
                <input type="password" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            </div>
            
            <p id="pin-error"></p>
            
            <button class="pin-btn" onclick="verifyPin()">Unlock Dashboard</button>
        </div>
    </div>

    <div id="dashboard-view">
        <div class="header">
            <h1>IPAK Succession Planning</h1>
            <p>Talent Mapping & Leadership Readiness Dashboard</p>
        </div>
        
        <div class="container">
            <div id="loader">Fetching live data...</div>
            <div class="tabs-container" id="tabs-container" style="display: none;"></div>
            <div class="cards-grid" id="grid-container"></div>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal" onclick="closeOnOverlay(event)">
        <div class="modal-container">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // --- OTP Input Interaction & Auth Logic ---
        const otpInputs = document.querySelectorAll('.otp-input');
        
        // Auto-focus first input
        window.onload = () => otpInputs[0].focus();

        otpInputs.forEach((input, index) => {
            // Handle Keyboard inputs
            input.addEventListener('keyup', (e) => {
                const currentInput = input;
                const nextInput = input.nextElementSibling;
                const prevInput = input.previousElementSibling;

                // On entering a digit, move forward
                if (currentInput.value.length > 1) {
                    currentInput.value = currentInput.value.slice(0, 1);
                }
                
                if (currentInput.value !== '' && e.key !== 'Backspace') {
                    if (nextInput) {
                        nextInput.focus();
                    } else {
                        // Auto-submit if last box is filled
                        verifyPin();
                    }
                }

                // On Backspace, move backward
                if (e.key === 'Backspace' && prevInput) {
                    prevInput.focus();
                    prevInput.value = '';
                }
                
                // Allow pressing Enter anytime
                if(e.key === 'Enter') verifyPin();
            });

            // Handle Pasting a full code
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 4);
                if (/^[0-9]{1,4}$/.test(pastedData)) {
                    pastedData.split('').forEach((char, i) => {
                        otpInputs[i].value = char;
                    });
                    if(pastedData.length === 4) verifyPin();
                    else otpInputs[pastedData.length].focus();
                }
            });
        });

        function verifyPin() {
            const errorMsg = document.getElementById('pin-error');
            const pinCard = document.getElementById('pin-card');
            
            // Collect PIN from all 4 inputs
            let pinVal = "";
            otpInputs.forEach(i => pinVal += i.value);
            
            if (pinVal === '8004') {
                // Success: Hide login smoothly, show dashboard, load data
                pinCard.style.opacity = '0';
                pinCard.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    document.getElementById('login-view').style.display = 'none';
                    document.getElementById('dashboard-view').style.display = 'block';
                    initDashboardData();
                }, 400); // Wait for fade out
            } else {
                // Failure: Shake animation & clear inputs
                errorMsg.textContent = 'Incorrect PIN. Try again.';
                otpInputs.forEach(i => i.value = '');
                otpInputs[0].focus();
                
                pinCard.classList.remove('shake-animation');
                void pinCard.offsetWidth; // Trigger reflow
                pinCard.classList.add('shake-animation');
            }
        }


        // --- Dashboard Data Logic (Runs after unlock) ---
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMzUbqogregSYqVmsiXYS-5BMroUTogKNoDDJIoeyZWAedwFbbwPNmfeNMX6O766_2NeuM3gFhqhED/pub?output=csv";
        const githubImageBaseUrl = "https://raw.githubusercontent.com/IPAKESP/ipaksuccessionplanning/refs/heads/main/"; 
        
        let globalData = [];
        let headerOccurrences = {};

        function initDashboardData() {
            const noCacheUrl = sheetCsvUrl + "&t=" + new Date().getTime();

            Papa.parse(noCacheUrl, {
                download: true, header: true, skipEmptyLines: true,
                transformHeader: function(header) {
                    let h = header.trim().replace(/[\r\n]+/g, ' '); 
                    if (headerOccurrences[h]) {
                        headerOccurrences[h]++;
                        return h + "_" + headerOccurrences[h]; 
                    }
                    headerOccurrences[h] = 1;
                    return h;
                },
                complete: function(results) {
                    document.getElementById('loader').style.display = 'none';
                    globalData = results.data;
                    renderTabs();
                    renderGrid(globalData);
                }
            });
        }

        function getVal(item, possibleKeys) {
            for (let pk of possibleKeys) {
                let target = pk.toLowerCase().replace(/[^a-z0-9_]/g, '');
                for (let key in item) {
                    let source = key.toLowerCase().replace(/[^a-z0-9_]/g, '');
                    if (source === target) {
                        let value = item[key];
                        if (value !== undefined && value !== null && String(value).trim() !== '') {
                            return String(value).trim();
                        }
                    }
                }
            }
            return 'N/A';
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.style.display = 'flex';
            container.innerHTML = ''; 
            
            const depts = ["All", ...new Set(globalData.map(d => getVal(d, ['Department'])).filter(d => d !== 'N/A'))];
            if(depts.length <= 1) return;

            depts.forEach((d, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = d;
                btn.onclick = (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const filtered = d === "All" ? globalData : globalData.filter(item => getVal(item, ['Department']) === d);
                    renderGrid(filtered);
                };
                container.appendChild(btn);
            });
        }

        function getInitials(name) {
            if (!name || name === 'N/A' || name === 'Vacant') return "NA";
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        }

        function generatePhotoUrl(name) {
            if (!name || name === 'N/A' || name === 'Vacant') return "";
            const formattedName = name.trim().toLowerCase().replace(/\s+/g, '_');
            return `${githubImageBaseUrl}${formattedName}.jpg`;
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = data.map((item, index) => {
                const posTitle = getVal(item, ['Position Title', 'Position']);
                const incumbentName = getVal(item, ['Incumbent Name', 'Incumbent']);
                const initials = getInitials(incumbentName);
                const photoUrl = generatePhotoUrl(incumbentName);
                
                return `
                    <div class="card-wrapper" onclick="openModal(${globalData.indexOf(item)})">
                        <div class="card-content">
                            <div class="card-avatar-container">
                                <img src="${photoUrl}" class="profile-img" alt="${incumbentName}" onerror="this.onerror=null; this.outerHTML='<span class=\\'fallback-initials\\'>${initials}</span>'">
                            </div>
                            <h3 class="role-title">${posTitle}</h3>
                            <p class="incumbent-name">${incumbentName}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(index) {
            const item = globalData[index];
            
            const posTitle = getVal(item, ['Position Title', 'Position']);
            const incumbentName = getVal(item, ['Incumbent Name', 'Incumbent']);
            const initials = getInitials(incumbentName);
            const photoUrl = generatePhotoUrl(incumbentName);
            
            let html = `
                <div class="modal-top-section">
                    <div class="modal-header-text">
                        <h2 class="modal-header-title">${posTitle}</h2>
                        <div class="modal-badge">Incumbent: ${incumbentName}</div>
                    </div>
                    <div class="modal-profile-container">
                        <img src="${photoUrl}" class="profile-img" alt="${incumbentName}" onerror="this.onerror=null; this.outerHTML='<span class=\\'fallback-initials\\'>${initials}</span>'">
                    </div>
                </div>

                <div class="section-title"><span></span> Position & Incumbent Details</div>
                <div class="info-grid">
                    <div class="info-card"><div class="info-label">Employee ID</div><div class="info-value">${getVal(item, ['Employee ID'])}</div></div>
                    <div class="info-card"><div class="info-label">Current Position</div><div class="info-value">${getVal(item, ['Current Position'])}</div></div>
                    <div class="info-card"><div class="info-label">Position Rating</div><div class="info-value">${getVal(item, ['Position Rating'])}</div></div>
                    <div class="info-card"><div class="info-label">Position Rating Score</div><div class="info-value">${getVal(item, ['Position Rating Score'])}</div></div>
                    <div class="info-card"><div class="info-label">Risk of Loss</div><div class="info-value">${getVal(item, ['Risk of Loss'])}</div></div>
                    <div class="info-card"><div class="info-label">Date of Joining</div><div class="info-value">${getVal(item, ['Date of Joining'])}</div></div>
                    <div class="info-card"><div class="info-label">IPAK Experience</div><div class="info-value">${getVal(item, ['IPAK Experience'])}</div></div>
                    <div class="info-card"><div class="info-label">Other Experience</div><div class="info-value">${getVal(item, ['Other Experience'])}</div></div>
                    <div class="info-card"><div class="info-label">Total Experience</div><div class="info-value">${getVal(item, ['Total Experience'])}</div></div>
                    <div class="info-card"><div class="info-label">Date of Birth</div><div class="info-value">${getVal(item, ['Date of Birth'])}</div></div>
                    <div class="info-card"><div class="info-label">Age</div><div class="info-value">${getVal(item, ['Age'])}</div></div>
                    <div class="info-card"><div class="info-label">Education</div><div class="info-value">${getVal(item, ['Education'])}</div></div>
                    <div class="info-card"><div class="info-label">Successor Availability</div><div class="info-value">${getVal(item, ['Successor Availability'])}</div></div>
                    <div class="info-card"><div class="info-label">No. of Successors</div><div class="info-value">${getVal(item, ['Number of Successors', 'No of Successors', 'No. of Successors'])}</div></div>
                </div>
            `;

            const successorName1 = getVal(item, ['Successor Name', 'Successor 1', 'Successor Name 1', 'Successor']);
            const successorName2 = getVal(item, ['Successor Name 2', 'Successor 2']);
            
            let hasSuccessor = false;

            if(successorName1 !== 'N/A') {
                hasSuccessor = true;
                const succ1Initials = getInitials(successorName1);
                const succ1PhotoUrl = generatePhotoUrl(successorName1);
                
                html += `
                <div class="successor-section succ-1">
                    <div class="successor-top">
                        <div class="section-title" style="margin-top: 0;"><span></span> Successor 1 Details</div>
                        <div class="successor-profile-container">
                            <img src="${succ1PhotoUrl}" class="profile-img" alt="${successorName1}" onerror="this.onerror=null; this.outerHTML='<span class=\\'fallback-initials\\'>${succ1Initials}</span>'">
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-card"><div class="info-label">Successor Name</div><div class="info-value">${successorName1}</div></div>
                        <div class="info-card"><div class="info-label">Employee ID</div><div class="info-value">${getVal(item, ['Successor Employee ID 1', 'Successor Empoyee ID 1', 'Successor Employee ID', 'Employee ID_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Current Position</div><div class="info-value">${getVal(item, ['Successor Current Position 1', 'Successor Current Position', 'Current Position_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Readiness Level</div><div class="info-value">${getVal(item, ['Readiness Level 1', 'Successor Readiness Level 1', 'Readiness Level'])}</div></div>
                        <div class="info-card"><div class="info-label">Date of Joining</div><div class="info-value">${getVal(item, ['Successor Date of Joining 1', 'Successor Date of Joining', 'Date of Joining_2'])}</div></div>
                        <div class="info-card"><div class="info-label">IPAK Experience</div><div class="info-value">${getVal(item, ['Successor IPAK Experience 1', 'Successor IPAK Experience', 'IPAK Experience_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Other Experience</div><div class="info-value">${getVal(item, ['Successor Other Experience 1', 'Successor Other Experience', 'Other Experience_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Total Experience</div><div class="info-value">${getVal(item, ['Successor Total Experience 1', 'Successor Total Experience', 'Total Experience_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Date of Birth</div><div class="info-value">${getVal(item, ['Successor Date of Birth 1', 'Successor Date of Birth', 'Date of Birth_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Age</div><div class="info-value">${getVal(item, ['Successor Age 1', 'Successor Age', 'Age_2'])}</div></div>
                        <div class="info-card"><div class="info-label">Education</div><div class="info-value">${getVal(item, ['Successor Education 1', 'Successor Education', 'Education_2'])}</div></div>
                    </div>
                </div>
                `;
            }

            if(successorName2 !== 'N/A') {
                hasSuccessor = true;
                const succ2Initials = getInitials(successorName2);
                const succ2PhotoUrl = generatePhotoUrl(successorName2);

                html += `
                <div class="successor-section succ-2">
                    <div class="successor-top">
                        <div class="section-title" style="margin-top: 0;"><span></span> Successor 2 Details</div>
                        <div class="successor-profile-container">
                            <img src="${succ2PhotoUrl}" class="profile-img" alt="${successorName2}" onerror="this.onerror=null; this.outerHTML='<span class=\\'fallback-initials\\'>${succ2Initials}</span>'">
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-card"><div class="info-label">Successor Name</div><div class="info-value">${successorName2}</div></div>
                        <div class="info-card"><div class="info-label">Employee ID</div><div class="info-value">${getVal(item, ['Successor Employee ID 2', 'Successor Empoyee ID 2', 'Successor 2 Employee ID', 'Employee ID_3'])}</div></div>
                        <div class="info-card"><div class="info-label">Current Position</div><div class="info-value">${getVal(item, ['Successor Current Position 2', 'Successor 2 Current Position', 'Current Position_3'])}</div></div>
                        <div class="info-card"><div class="info-label">Readiness Level</div><div class="info-value">${getVal(item, ['Readiness Level 2', 'Successor Readiness Level 2', 'Readiness Level_3'])}</div></div>
                        <div class="info-card"><div class="info-label">Date of Joining</div><div class="info-value">${getVal(item, ['Successor Date of Joining 2', 'Successor 2 Date of Joining', 'Date of Joining_3'])}</div></div>
                        <div class="info-card"><div class="info-label">IPAK Experience</div><div class="info-value">${getVal(item, ['Successor IPAK Experience 2', 'Successor 2 IPAK Experience', 'IPAK Experience_3'])}</div></div>
                        <div class="info-card"><div class="info-label">Other Experience</div><div class="info-value">${getVal(item, ['Successor Other Experience 2', 'Successor 2 Other Experience', 'Other Experience_3'])}</div></div>
                        <div class="info-card"><div class="info-label">Total Experience</div><div class="info-value">${getVal(item, ['Successor Total Experience 2', 'Successor 2 Total Experience', 'Total Experience_3'])}</div></div>
                        <div class="info-card"><div class="info-label">Date of Birth</div><div class="info-value">${getVal(item, ['Successor Date of Birth 2', 'Successor 2 Date of Birth', 'Date of Birth_3'])}</div></div>
                        <div class="info-card"><div class="info-label">Age</div><div class="info-value">${getVal(item, ['Successor Age 2', 'Successor 2 Age', 'Age_3'])}</div></div>
                        <div class="info-card"><div class="info-label">Education</div><div class="info-value">${getVal(item, ['Successor Education 2', 'Successor 2 Education', 'Education_3'])}</div></div>
                    </div>
                </div>
                `;
            }

            if(!hasSuccessor) {
                html += `
                <div class="successor-section succ-none">
                    <div class="section-title" style="margin-top: 0;"><span></span> Successor Details</div>
                    <p>No successor currently mapped for this position.</p>
                </div>
                `;
            }

            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() { 
            document.getElementById('detailModal').classList.remove('active'); 
            document.body.style.overflow = 'auto';
        }

        function closeOnOverlay(event) {
            if (event.target.id === 'detailModal') {
                closeModal();
            }
        }
    </script>
</body>
</html>
